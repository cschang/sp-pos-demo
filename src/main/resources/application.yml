spring:
  application:
    name: sp-pos
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:sqlite:db.sqlite3
          driver-class-name: org.sqlite.JDBC
  thymeleaf:
    cache: false
    check-template-location: true
    encoding: UTF-8
    suffix: .html
    prefix: classpath:/templates/
server:
  port: 8000
  servlet:
    context-path: /

# MyBatis 相關配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.philip.lab.model
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

# 顯示 SQL 日誌，方便除錯
logging:
  level:
    com:
      philip:
        lab:
          mapper: DEBUG